name: ShipBrain Sandbox CI

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: shipbrain-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Print context
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          echo "SHA: $GITHUB_SHA"
          echo "Event: $GITHUB_EVENT_NAME"

      - name: Optional failure switch
        run: |
          if [ -f shipbrain-force-fail.txt ]; then
            echo "shipbrain-force-fail.txt found, failing for ShipBrain CI test"
            exit 1
          fi

      - name: Pass smoke check
        run: echo "ShipBrain sandbox CI passed"
