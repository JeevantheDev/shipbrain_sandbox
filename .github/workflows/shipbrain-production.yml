name: ShipBrain Production Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., cart-v2026.05.24)'
        required: true
      release_sha:
        description: 'Release commit SHA'
        required: true
      is_hotfix:
        description: 'Is this a hotfix deployment?'
        required: false
        default: 'false'
      reverse_sync:
        description: 'Sync changes back to develop after hotfix?'
        required: false
        default: 'true'

  push:
    tags:
      - 'cart-v*'
      - 'release-v*'
      - 'hotfix-v*'

jobs:
  production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production_url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"

      - name: Output Production URL
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Release: ${{ github.event.inputs.release_tag || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Production URL: ${{ steps.deploy.outputs.production_url }}" >> $GITHUB_STEP_SUMMARY

  reverse-sync:
    needs: production
    if: ${{ github.event.inputs.is_hotfix == 'true' && github.event.inputs.reverse_sync == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create reverse sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout -b reverse-sync/${{ github.event.inputs.release_tag }}
          git push origin reverse-sync/${{ github.event.inputs.release_tag }}
          gh pr create \
            --title "Reverse sync: ${{ github.event.inputs.release_tag }} to develop" \
            --body "Automated reverse sync of hotfix ${{ github.event.inputs.release_tag }} from main to develop." \
            --base develop \
            --head reverse-sync/${{ github.event.inputs.release_tag }}
