name: ShipBrain Vercel Production Deploy

on:
  push:
    tags:
      - "cart-v*"
      - "hotfix-v*"
      - "shipbrain-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag approved in ShipBrain
        required: true
        type: string
      release_sha:
        description: Merge commit SHA for the approved release
        required: true
        type: string

concurrency:
  group: shipbrain-vercel-prod
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      SHIPBRAIN_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      SHIPBRAIN_RELEASE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.release_sha || github.sha }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify release ref
        run: |
          test "$(git rev-parse HEAD)" = "$SHIPBRAIN_RELEASE_SHA"
          echo "Deploying $SHIPBRAIN_RELEASE_TAG at $SHIPBRAIN_RELEASE_SHA"

      - name: Stamp ShipBrain release version
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const releaseTag = process.env.SHIPBRAIN_RELEASE_TAG;
          const files = ['index.html', 'api/release.js', 'api/trigger-incident.js', 'server.mjs'];
          const pattern = /cart-v\d{4}\.\d{2}\.\d{2}(?:[-\w.]*)?|hotfix-v\d{4}\.\d{2}\.\d{2}(?:[-\w.]*)?|shipbrain-v\d{4}\.\d{2}\.\d{2}(?:[-\w.]*)?|cart-local-dev/g;
          for (const file of files) {
            if (!fs.existsSync(file)) continue;
            const current = fs.readFileSync(file, 'utf8');
            const next = current.replace(pattern, releaseTag);
            if (next !== current) fs.writeFileSync(file, next);
          }
          NODE

      - name: Pull Vercel project settings
        run: npx vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel artifact
        run: npx vercel@latest build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy approved production release
        run: npx vercel@latest deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}" --env SHIPBRAIN_RELEASE_TAG="$SHIPBRAIN_RELEASE_TAG" --env PAGERDUTY_ROUTING_KEY="${{ secrets.PAGERDUTY_ROUTING_KEY }}"
