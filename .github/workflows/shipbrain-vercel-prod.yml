name: ShipBrain Vercel Production Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag approved in ShipBrain
        required: true
        type: string
      release_sha:
        description: Merge commit SHA for the approved release
        required: true
        type: string

concurrency:
  group: shipbrain-vercel-prod
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      SHIPBRAIN_RELEASE_TAG: ${{ inputs.release_tag }}
      SHIPBRAIN_RELEASE_SHA: ${{ inputs.release_sha }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify release ref
        run: |
          test "$(git rev-parse HEAD)" = "$SHIPBRAIN_RELEASE_SHA"
          echo "Deploying $SHIPBRAIN_RELEASE_TAG at $SHIPBRAIN_RELEASE_SHA"

      - name: Pull Vercel project settings
        run: npx vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel artifact
        run: npx vercel@latest build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy approved production release
        run: npx vercel@latest deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}" --env SHIPBRAIN_RELEASE_TAG="$SHIPBRAIN_RELEASE_TAG" --env PAGERDUTY_ROUTING_KEY="${{ secrets.PAGERDUTY_ROUTING_KEY }}"
